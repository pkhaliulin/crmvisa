name: RLS Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rls-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crmvisa_test
          POSTGRES_USER: crmvisa
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, redis, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations with RLS
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: crmvisa_test
          DB_USERNAME: crmvisa
          DB_PASSWORD: test_password
        run: |
          php artisan migrate --force

      - name: Run RLS tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: crmvisa_test
          DB_USERNAME: crmvisa
          DB_PASSWORD: test_password
        run: php artisan test --testsuite=rls
